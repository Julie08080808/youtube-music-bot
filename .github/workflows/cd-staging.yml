name: CD Staging

on:
  workflow_run:
    workflows:
      - Main Build
    types:
      - completed
    branches:
      - main

concurrency:
  group: cd-staging-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  REGISTRY: harbor.jlsa.local:30443
  IMAGE_NAME: ci/youtube-music-bot
  APP_NAME: youtube-music-bot
  APP_PORT: "3000"

  STAGING_NAMESPACE: staging-youtube-music-bot
  STAGING_NODE_PORT: "31081"

  ARGOCD_NAMESPACE: argocd
  ARGOCD_STAGING_APP: youtube-music-bot-staging

  GITOPS_REPO_URL: https://github.com/Julie08080808/youtube-music-bot-gitops.git
  GITOPS_REPO_BRANCH: main
  GITOPS_STAGING_PATH: apps/youtube-music-bot/overlays/staging

jobs:
  deploy-staging:
    name: Update GitOps Staging
    runs-on: arc-runner-set
    timeout-minutes: 20
    environment: staging

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Install kubectl
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/bin"

          KUBECTL_VERSION="v1.30.14"

          echo "Installing kubectl ${KUBECTL_VERSION}"

          curl -L --fail --retry 3 \
            -o "$RUNNER_TEMP/bin/kubectl" \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"

          chmod +x "$RUNNER_TEMP/bin/kubectl"

          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

          "$RUNNER_TEMP/bin/kubectl" version --client

      - name: Configure Kubernetes Auth
        env:
          K8S_KUBECONFIG_B64: ${{ secrets.K8S_KUBECONFIG_B64 }}
        run: |
          set -euo pipefail

          if [ -z "${K8S_KUBECONFIG_B64:-}" ]; then
            echo "K8S_KUBECONFIG_B64 is empty."
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/kube"

          printf "%s" "$K8S_KUBECONFIG_B64" \
            | base64 -d > "$RUNNER_TEMP/kube/config"

          chmod 600 "$RUNNER_TEMP/kube/config"

          echo "KUBECONFIG=$RUNNER_TEMP/kube/config" >> "$GITHUB_ENV"
          export KUBECONFIG="$RUNNER_TEMP/kube/config"

          echo "Testing Kubernetes API access..."
          kubectl get --raw=/version

          echo "Current context:"
          kubectl config current-context

      - name: Download Main Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: main-build-artifacts
          path: main-build-artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Resolve Image Digest
        run: |
          set -euo pipefail

          echo "Downloaded artifacts:"
          find main-build-artifacts -maxdepth 2 -type f -print

          IMAGE_METADATA="main-build-artifacts/image-metadata.txt"

          if [ ! -f "${IMAGE_METADATA}" ]; then
            echo "image-metadata.txt not found."
            exit 1
          fi

          echo "Image metadata:"
          cat "${IMAGE_METADATA}"

          SHORT_SHA="$(grep -E '^SHORT_SHA=' "${IMAGE_METADATA}" | tail -1 | sed 's/^SHORT_SHA=//')"
          IMAGE_DIGEST_VALUE="$(grep -E '^IMAGE_DIGEST_VALUE=' "${IMAGE_METADATA}" | tail -1 | sed 's/^IMAGE_DIGEST_VALUE=//')"
          IMAGE_DIGEST="$(grep -E '^IMAGE_DIGEST=' "${IMAGE_METADATA}" | tail -1 | sed 's/^IMAGE_DIGEST=//')"

          if [ -z "${SHORT_SHA}" ] || [ -z "${IMAGE_DIGEST_VALUE}" ] || [ -z "${IMAGE_DIGEST}" ]; then
            echo "Failed to resolve image metadata."
            exit 1
          fi

          case "${IMAGE_DIGEST}" in
            ${REGISTRY}/${IMAGE_NAME}@sha256:*)
              echo "Image digest format OK."
              ;;
            *)
              echo "Invalid image digest format."
              echo "IMAGE_DIGEST=${IMAGE_DIGEST}"
              exit 1
              ;;
          esac

          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_DIGEST_VALUE=${IMAGE_DIGEST_VALUE}" >> "$GITHUB_ENV"
          echo "IMAGE_DIGEST=${IMAGE_DIGEST}" >> "$GITHUB_ENV"

          echo "Resolved staging image:"
          echo "${IMAGE_DIGEST}"

      - name: Update GitOps Staging Digest
        env:
          GITOPS_REPO_TOKEN: ${{ secrets.GITOPS_REPO_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GITOPS_REPO_TOKEN:-}" ]; then
            echo "GITOPS_REPO_TOKEN is empty."
            exit 1
          fi

          GITOPS_DIR="$RUNNER_TEMP/gitops"

          echo "Cloning GitOps repo..."
          git clone \
            --branch "${GITOPS_REPO_BRANCH}" \
            "https://x-access-token:${GITOPS_REPO_TOKEN}@github.com/Julie08080808/youtube-music-bot-gitops.git" \
            "${GITOPS_DIR}"

          cd "${GITOPS_DIR}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          KUSTOMIZATION="${GITOPS_STAGING_PATH}/kustomization.yaml"

          if [ ! -f "${KUSTOMIZATION}" ]; then
            echo "Kustomization file not found: ${KUSTOMIZATION}"
            exit 1
          fi

          echo "Before update:"
          cat "${KUSTOMIZATION}"

          GITOPS_KUSTOMIZATION="${KUSTOMIZATION}" python3 - << 'PY'
          import os
          import re
          from pathlib import Path

          path = Path(os.environ["GITOPS_KUSTOMIZATION"])
          digest = os.environ["IMAGE_DIGEST_VALUE"]

          text = path.read_text()

          new_text, count = re.subn(
              r'(^\s*digest:\s*).+$',
              r'\1' + digest,
              text,
              count=1,
              flags=re.MULTILINE,
          )

          if count != 1:
              raise SystemExit("Failed to update digest line in kustomization.yaml")

          path.write_text(new_text)
          PY

          echo "After update:"
          cat "${KUSTOMIZATION}"

          git status --short

          if git diff --quiet; then
            echo "GitOps staging digest already up to date."
            exit 0
          fi

          git add "${KUSTOMIZATION}"
          git commit -m "gitops: promote ${SHORT_SHA} to staging"
          git push origin "${GITOPS_REPO_BRANCH}"

          echo "GitOps staging digest updated."

      - name: Wait for Argo CD Staging Sync
        run: |
          set -euo pipefail

          echo "Requesting Argo CD hard refresh..."

          kubectl annotate application "${ARGOCD_STAGING_APP}" \
            -n "${ARGOCD_NAMESPACE}" \
            argocd.argoproj.io/refresh=hard \
            --overwrite

          echo "Waiting for Argo CD app to become Synced and Healthy..."

          for i in $(seq 1 90); do
            SYNC_STATUS="$(kubectl get application "${ARGOCD_STAGING_APP}" \
              -n "${ARGOCD_NAMESPACE}" \
              -o jsonpath='{.status.sync.status}' 2>/dev/null || true)"

            HEALTH_STATUS="$(kubectl get application "${ARGOCD_STAGING_APP}" \
              -n "${ARGOCD_NAMESPACE}" \
              -o jsonpath='{.status.health.status}' 2>/dev/null || true)"

            echo "Attempt ${i}: sync=${SYNC_STATUS:-unknown}, health=${HEALTH_STATUS:-unknown}"

            if [ "${SYNC_STATUS}" = "Synced" ] && [ "${HEALTH_STATUS}" = "Healthy" ]; then
              echo "Argo CD staging app is Synced and Healthy."
              break
            fi

            sleep 5
          done

          SYNC_STATUS="$(kubectl get application "${ARGOCD_STAGING_APP}" \
            -n "${ARGOCD_NAMESPACE}" \
            -o jsonpath='{.status.sync.status}')"

          HEALTH_STATUS="$(kubectl get application "${ARGOCD_STAGING_APP}" \
            -n "${ARGOCD_NAMESPACE}" \
            -o jsonpath='{.status.health.status}')"

          if [ "${SYNC_STATUS}" != "Synced" ] || [ "${HEALTH_STATUS}" != "Healthy" ]; then
            echo "Argo CD staging app did not become Synced and Healthy."
            kubectl describe application "${ARGOCD_STAGING_APP}" -n "${ARGOCD_NAMESPACE}"
            exit 1
          fi

      - name: Verify Staging Deployment
        run: |
          set -euo pipefail

          echo "Waiting for staging rollout..."
          kubectl rollout status deployment/${APP_NAME} \
            -n "${STAGING_NAMESPACE}" \
            --timeout=180s

          LIVE_IMAGE="$(kubectl get deployment "${APP_NAME}" \
            -n "${STAGING_NAMESPACE}" \
            -o jsonpath='{.spec.template.spec.containers[0].image}')"

          echo "Expected image: ${IMAGE_DIGEST}"
          echo "Live image:     ${LIVE_IMAGE}"

          if [ "${LIVE_IMAGE}" != "${IMAGE_DIGEST}" ]; then
            echo "Staging live image does not match expected image."
            exit 1
          fi

          POD_NODE="$(kubectl get pod -n "${STAGING_NAMESPACE}" \
            -l app="${APP_NAME}" \
            -o jsonpath='{.items[0].spec.nodeName}')"

          echo "Staging pod node: ${POD_NODE}"

          if [ "${POD_NODE}" != "node3" ]; then
            echo "Staging pod is not running on node3."
            exit 1
          fi

          kubectl get pods -n "${STAGING_NAMESPACE}" -o wide
          kubectl get svc -n "${STAGING_NAMESPACE}"

      - name: Smoke Test Staging
        run: |
          set -euo pipefail

          STAGING_CLUSTER_URL="http://${APP_NAME}.${STAGING_NAMESPACE}.svc.cluster.local:${APP_PORT}"

          echo "Testing staging service inside cluster:"
          echo "${STAGING_CLUSTER_URL}"

          for i in $(seq 1 30); do
            if curl -fsS "${STAGING_CLUSTER_URL}" > /tmp/staging-response.html; then
              echo "Staging cluster smoke test passed."
              head -20 /tmp/staging-response.html || true
              exit 0
            fi

            echo "Waiting for staging service... ${i}"
            sleep 5
          done

          echo "Staging smoke test failed."
          kubectl get pods -n "${STAGING_NAMESPACE}" -o wide
          kubectl describe deployment "${APP_NAME}" -n "${STAGING_NAMESPACE}"
          exit 1

      - name: Write Staging Summary
        if: always()
        run: |
          echo "## GitOps CD Staging Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Namespace | \`${STAGING_NAMESPACE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| App | \`${APP_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image Digest | \`${IMAGE_DIGEST:-not-resolved}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Argo CD App | \`${ARGOCD_STAGING_APP}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GitOps Path | \`${GITOPS_STAGING_PATH}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Node Selector | \`dedicated=production-storage\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Expected Node | \`node3\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster URL | \`http://${APP_NAME}.${STAGING_NAMESPACE}.svc.cluster.local:${APP_PORT}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| NodePort | \`${STAGING_NODE_PORT}\` |" >> "$GITHUB_STEP_SUMMARY"
